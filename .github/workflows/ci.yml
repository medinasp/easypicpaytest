name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: BUILD E TESTES UNITÁRIOS
  # ──────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 📦 Restore dependencies
      run: dotnet restore EasyPicPay.sln

    - name: 🔨 Build
      run: dotnet build EasyPicPay.sln --configuration Release --no-restore

    - name: 🧪 Run tests
      run: dotnet test src/TestEasyPicPay/TestEasyPicPay.csproj --configuration Release --no-build --verbosity normal

  # ──────────────────────────────────────────────────────────
  # JOB 2: BUILD E PUSH DA IMAGEM (somente push na main)
  # ──────────────────────────────────────────────────────────
  build-and-push-image:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🔑 Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: 🏗️ Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ github.sha }} .

    - name: 🚀 Push image com SHA
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ github.sha }}

    - name: 🚀 Push latest
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ github.sha }} \
                   ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:latest

  # ──────────────────────────────────────────────────────────
  # JOB 3: CRIAR PR NO REPO GITOPS (somente push na main)
  # ──────────────────────────────────────────────────────────
  create-pr-on-gitops-repo:
    needs: build-and-push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout GitOps repo
      uses: actions/checkout@v4
      with:
        repository: medinasp/k8s-easy-picpay
        token: ${{ secrets.GITOPS_TOKEN }}
        path: k8s-easy-picpay

    - name: 🔄 Update image tag no GitOps
      run: |
        cd k8s-easy-picpay
        sed -i "s|image: eneiasmedina/easypicpay-api:.*|image: ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ github.sha }}|" \
          apps/picpay-api/overlays/prod/rollout.yaml
        git status

    - name: ✨ Create Pull Request no GitOps
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITOPS_TOKEN }}
        path: k8s-easy-picpay
        commit-message: "🚀 Deploy image ${{ github.sha }}"
        title: "🚀 Deploy: nova imagem ${{ github.sha }}"
        body: |
          **Imagem:** `${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ github.sha }}`
          **Origem:** Commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          **Autor:** @${{ github.actor }}
          
          Este PR foi gerado automaticamente pelo CI.
        branch: deploy-${{ github.sha }}
        base: main
        delete-branch: true