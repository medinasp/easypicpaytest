name: CI Pipeline

# ────────────────────────────────────────────────────────────
# 📍 EVENTOS QUE DISPARAM O PIPELINE
# ────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# ────────────────────────────────────────────────────────────
# 🎯 JOBS DO PIPELINE
# ────────────────────────────────────────────────────────────
jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: BUILD E TESTE (roda em PRs e pushes)
  # ──────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: 📦 Restore dependencies
      run: dotnet restore EasyPicPay.sln
    
    - name: 🔨 Build
      run: dotnet build EasyPicPay.sln --configuration Release --no-restore
    
    - name: 🧪 Run tests
      run: dotnet test src/TestEasyPicPay/TestEasyPicPay.csproj --configuration Release --no-build --verbosity normal

  # ──────────────────────────────────────────────────────────
  # JOB 2: BUILD, TESTE COM BANCO REAL E PUSH DA IMAGEM
  # ──────────────────────────────────────────────────────────
  build-and-push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    # 🚀 SERVICE CONTAINERS - GitHub gerencia o PostgreSQL automaticamente
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: EasyPicPayDB
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🔑 Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    # Define a tag DINÂMICA baseada no tipo de evento
    - name: 🏷️ Set image tag
      id: tags
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "TAG=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
        else
          echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi
    
    # Build da imagem com a tag definida
    - name: 🏗️ Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }} .
    
    # 🧪 TESTE DA IMAGEM COM BANCO DE DADOS REAL (via service container)
    - name: 🧪 Test image with PostgreSQL
      run: |
        # Sobe a API
        docker run -d \
          --name test-api \
          -p 8080:80 \
          --add-host host.docker.internal:host-gateway \
          -e ConnectionStrings__DefaultConnection="Host=host.docker.internal;Port=5432;Database=EasyPicPayDB;Username=postgres;Password=root" \
          ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }}
        
        echo "Aguardando API iniciar..."
        
        # Espera até ver "Application started" nos logs
        for i in {1..60}; do
          echo -n "."
          sleep 1
          
          if docker logs test-api 2>&1 | grep -q "Application started"; then
            echo ""
            echo "✅ API iniciou após $i segundos!"
            break
          fi
          
          if [ $i -eq 60 ]; then
            echo ""
            echo "❌ API não iniciou em 60 segundos"
            docker logs test-api
            exit 1
          fi
        done
        
        # Aguarda mais 2 segundos para estabilizar
        sleep 2
        
        # Tenta o endpoint até 5 vezes
        echo "Testando /api/wallets..."
        for j in {1..5}; do
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/wallets || echo "000")
          
          if [ "$HTTP_CODE" = "000" ]; then
            echo "Tentativa $j: conexão falhou, aguardando..."
            sleep 3
          elif [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 401 ] || [ "$HTTP_CODE" -eq 400 ]; then
            echo "✅ API respondeu com código $HTTP_CODE na tentativa $j"
            echo "✅ Teste passou!"
            exit 0
          else
            echo "Tentativa $j: código $HTTP_CODE, aguardando..."
            sleep 3
          fi
        done
        
        echo "❌ Falha após 5 tentativas"
        echo "📋 Últimos logs da API:"
        docker logs test-api --tail 50
        exit 1
    
    # 🚀 Push da imagem (sempre, tanto PR quanto main)
    - name: 🚀 Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }}
    
    # Se for push na main, atualiza também a tag latest
    - name: 🚀 Push latest (only main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:latest
