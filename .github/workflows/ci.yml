name: CI Pipeline

# ────────────────────────────────────────────────────────────
# 📍 EVENTOS QUE DISPARAM O PIPELINE
# ────────────────────────────────────────────────────────────
on:
  # Roda em todo pull request para a main
  pull_request:
    branches: [ main ]
  
  # Roda após merge na main (para buildar imagem)
  push:
    branches: [ main ]

# ────────────────────────────────────────────────────────────
# 🎯 JOBS DO PIPELINE
# ────────────────────────────────────────────────────────────
jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: BUILD E TESTE (roda em PRs e pushes)
  # ──────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    # Baixa o código do repositório
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    # Configura a versão do .NET
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    # Restaura pacotes NuGet
    - name: 📦 Restore dependencies
      run: dotnet restore EasyPicPay.sln
    
    # Compila o projeto em modo Release
    - name: 🔨 Build
      run: dotnet build EasyPicPay.sln --configuration Release --no-restore
    
    # Roda os testes (✅ Se falhar, trava o pipeline)
    - name: 🧪 Run tests
      run: dotnet test src/TestEasyPicPay/TestEasyPicPay.csproj --configuration Release --no-build --verbosity normal
    
    # (Opcional) Salva os resultados dos testes como artefato
    - name: 📊 Upload test results
      uses: actions/upload-artifact@v4
      if: always()  # Roda mesmo se os testes falharem
      with:
        name: test-results
        path: TestResults/

  # ──────────────────────────────────────────────────────────
  # JOB 2: BUILD E PUSH DA IMAGEM (só após build-and-test passar)
  # ──────────────────────────────────────────────────────────
  build-and-push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🔑 Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    # Define a tag DINÂMICA baseada no tipo de evento
    - name: 🏷️ Set image tag
      id: tags
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "TAG=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
        else
          echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi
    
    # Build da imagem com a tag definida
    - name: 🏗️ Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }} .
    
    # Teste rápido da imagem
    - name: 🧪 Test image
      run: |
        # Sobe container em background
        docker run -d --name test-api -p 8081:80 ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }}
        
        # Aguarda API iniciar
        sleep 10
        
        # Testa endpoint (ajuste conforme sua API)
        curl --fail http://localhost:8081/api/wallets || exit 1
        
        # Se chegou aqui, o teste passou!
        echo "✅ Imagem testada com sucesso!"
    
    # Push da imagem (sempre, tanto PR quanto main)
    - name: 🚀 Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }}
    
    # Se for push na main, atualiza também a tag latest
    - name: 🚀 Push latest (only main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:latest
  # ──────────────────────────────────────────────────────────
  # JOB 3: ROLLBACK AUTOMÁTICO (opcional - avançado)
  # ──────────────────────────────────────────────────────────
  # Este job cria um PR de rollback se algo falhar na main
  # (Descomente se quiser usar)
