name: CI Pipeline

# ────────────────────────────────────────────────────────────
# 📍 EVENTOS QUE DISPARAM O PIPELINE
# ────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# ────────────────────────────────────────────────────────────
# 🎯 JOBS DO PIPELINE
# ────────────────────────────────────────────────────────────
jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: BUILD E TESTE (roda em PRs e pushes)
  # ──────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: 📦 Restore dependencies
      run: dotnet restore EasyPicPay.sln
    
    - name: 🔨 Build
      run: dotnet build EasyPicPay.sln --configuration Release --no-restore
    
    - name: 🧪 Run tests
      run: dotnet test src/TestEasyPicPay/TestEasyPicPay.csproj --configuration Release --no-build --verbosity normal

  # ──────────────────────────────────────────────────────────
  # JOB 2: BUILD, TESTE COM BANCO REAL E PUSH DA IMAGEM
  # ──────────────────────────────────────────────────────────
  build-and-push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    # 🚀 SERVICE CONTAINERS - GitHub gerencia o PostgreSQL automaticamente
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: EasyPicPayDB
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
    
    - name: 🔑 Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    
    # Define a tag DINÂMICA baseada no tipo de evento
    - name: 🏷️ Set image tag
      id: tags
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "TAG=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
        else
          echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT
        fi
    
    # Build da imagem com a tag definida
    - name: 🏗️ Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }} .
    
    # 🧪 TESTE DA IMAGEM COM BANCO DE DADOS REAL (via service container)
    - name: 🧪 Test image with PostgreSQL
      run: |
        # Sobe a API usando network=host
        docker run -d \
          --name test-api \
          --network host \
          --add-host host.docker.internal:host-gateway \
          -e ConnectionStrings__DefaultConnection="Host=host.docker.internal;Port=5432;Database=EasyPicPayDB;Username=postgres;Password=root" \
          ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }}
        
        echo "Aguardando API iniciar..."
        
        # Monitora logs
        timeout 60 bash -c '
          while ! docker logs test-api 2>&1 | grep -q "Application started"; do
            echo -n "."
            sleep 2
          done
        '
        
        echo ""
        echo "✅ API iniciou!"
        sleep 3
        
        # Testa NO IPV4 explícito (127.0.0.1) e com timeout maior
        echo "Testando /api/wallets em 127.0.0.1:8080..."
        
        # Primeiro, verifica se a porta está escutando
        echo "🔍 Verificando portas:"
        ss -tulpn | grep 8080 || echo "Porta 8080 não encontrada"
        
        # Tenta curl com timeout de 10 segundos e opções extras
        curl -v --connect-timeout 10 --retry 3 --retry-delay 2 http://127.0.0.1:8080/api/wallets || {
          echo "❌ Falha no curl. Tentando com localhost..."
          curl -v --connect-timeout 10 http://localhost:8080/api/wallets || {
            echo "❌ Falha também em localhost."
            echo "📋 Logs completos:"
            docker logs test-api
            exit 1
          }
        }
        
        echo "✅ Teste passou!"
    
    # 🚀 Push da imagem (sempre, tanto PR quanto main)
    - name: 🚀 Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }}
    
    # Se for push na main, atualiza também a tag latest
    - name: 🚀 Push latest (only main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:latest

# ──────────────────────────────────────────────────────────
# JOB 3: CRIAR PULL REQUEST NO REPO GITOPS (APENAS QUANDO MERGE NA MAIN)
# ──────────────────────────────────────────────────────────
create-pr-on-gitops-repo:
  needs: build-and-push-image
  if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  runs-on: ubuntu-latest
  permissions:
    contents: write
    pull-requests: write

  steps:
  - name: 📥 Checkout GitOps repo
    uses: actions/checkout@v4
    with:
      repository: medinasp/k8s-easy-picpay
      token: ${{ secrets.GITOPS_TOKEN }}
      path: k8s-easy-picpay

  - name: 🏷️ Set image tag
    id: tags
    run: echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

  - name: 🔄 Update image in GitOps repo
    run: |
      cd k8s-easy-picpay
      # Atualiza a imagem no overlay de produção
      sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }}|" \
        apps/picpay-api/overlays/prod/rollout.yaml

  - name: ✨ Create Pull Request
    uses: peter-evans/create-pull-request@v6
    with:
      token: ${{ secrets.GITOPS_TOKEN }}
      path: k8s-easy-picpay
      commit-message: "🚀 Deploy image ${{ steps.tags.outputs.TAG }}"
      title: "🚀 Deploy: nova imagem ${{ steps.tags.outputs.TAG }}"
      body: |
        **Imagem:** `${{ secrets.DOCKER_USERNAME }}/easypicpay-api:${{ steps.tags.outputs.TAG }}`
        **Origem:** Commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
        **Autor:** @${{ github.actor }}

        Este PR foi gerado automaticamente pelo CI.
      branch: deploy-${{ steps.tags.outputs.TAG }}
      base: main
      delete-branch: true
